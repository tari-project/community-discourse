---
- name: Ensure /opt/tari-discourse exists
  ansible.builtin.stat:
    path: /opt/tari-discourse/.git
  register: repo_dir

- name: Clone community-discourse repo
  ansible.builtin.git:
    repo: https://github.com/tari-project/community-discourse.git
    dest: /opt/tari-discourse
    version: main
    depth: 1
    force: true
  when: not repo_dir.stat.exists

- name: Pull latest changes
  ansible.builtin.git:
    repo: https://github.com/tari-project/community-discourse.git
    dest: /opt/tari-discourse
    version: main
    force: true
  when: repo_dir.stat.exists

- name: Copy .env file
  ansible.builtin.copy:
    src: "{{ env_file }}"
    dest: /opt/tari-discourse/.env
    mode: "0600"
    owner: root
    group: root

- name: Run install.sh
  ansible.builtin.command:
    cmd: ./deploy/install.sh
    chdir: /opt/tari-discourse
  register: install_result
  changed_when: true

- name: Show install.sh output
  ansible.builtin.debug:
    var: install_result.stdout_lines

- name: Verify forum is responding
  ansible.builtin.uri:
    url: "https://{{ forum_domain | default(lookup('env', 'FORUM_DOMAIN')) }}/srv/status"
    method: GET
    status_code: 200
    validate_certs: true
  register: health_check
  retries: 12
  delay: 30
  until: health_check.status == 200
  ignore_errors: true

- name: Report health check result
  ansible.builtin.debug:
    msg: >-
      {{ 'Forum is live and responding at https://' ~ (forum_domain | default('(unknown)')) ~ '/srv/status'
         if health_check.status | default(0) == 200
         else 'Health check did not pass — forum may still be starting. Check manually.' }}
